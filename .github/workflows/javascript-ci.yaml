name: Javascript CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Build project
        run: |
          npm ci
          npm run build --if-present
          npm test
